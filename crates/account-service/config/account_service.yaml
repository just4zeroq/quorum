service:
  name: "account-service"
  host: "0.0.0.0"
  port: 50019

database:
  db_type: "sqlite"
  file_path: "./data/account_service.db"
  max_connections: 10
  min_connections: 1

assets:
  base:
    name: "USDT"
    precision: 6  # 1 USDT = 1,000,000 最小单位
  outcome:
    precision: 4    # 结果代币默认精度

risk:
  max_deposit: "1000000"      # 单笔最大充值 (最小单位)
  max_withdraw: "100000"      # 单笔最大提现 (最小单位)
syntax = "proto3";
package matching;

service MatchingService {
    rpc SubmitOrder(OrderCommandRequest) returns (OrderResponse);
    rpc CancelOrder(CancelRequest) returns (CancelResponse);
    rpc GetOrderBook(OrderBookRequest) returns (OrderBookResponse);
}

message OrderCommandRequest {
    bytes command_data = 1;
}

message OrderResponse {
    bool success = 1;
    string message = 2;
    bytes result_data = 3;
}

message CancelRequest {
    bytes cancel_data = 1;
}

message CancelResponse {
    bool success = 1;
    string message = 2;
}

message OrderBookRequest {
    uint64 market_id = 1;
    string outcome_asset = 2;
}

message OrderBookResponse {
    bool success = 1;
    string message = 2;
    bytes orderbook_data = 3;
}

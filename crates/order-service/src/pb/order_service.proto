syntax = "proto3";

package order;

service OrderService {
    // 订单操作
    rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
    rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
    rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
    rpc GetUserOrders(GetUserOrdersRequest) returns (GetUserOrdersResponse);

    // 批量操作
    rpc GetOrdersByMarket(GetOrdersByMarketRequest) returns (GetOrdersByMarketResponse);

    // 订单状态更新（由 Matching Engine 调用）
    rpc UpdateOrderStatus(UpdateOrderStatusRequest) returns (UpdateOrderStatusResponse);
}

// ========== 请求消息 ==========

message CreateOrderRequest {
    int64 user_id = 1;
    int64 market_id = 2;
    int64 outcome_id = 3;
    string side = 4;           // buy, sell
    string order_type = 5;     // limit, market, ioc, fok, post_only
    string price = 6;          // 价格 (0-1 for prediction market)
    string quantity = 7;       // 数量
    string client_order_id = 8; // 客户端订单ID (可选)
}

message CancelOrderRequest {
    string order_id = 1;
    int64 user_id = 2;
}

message GetOrderRequest {
    string order_id = 1;
}

message GetUserOrdersRequest {
    int64 user_id = 1;
    int64 market_id = 2;       // 可选
    string status = 3;         // 可选过滤
    int32 page = 4;
    int32 page_size = 5;
}

message GetOrdersByMarketRequest {
    int64 market_id = 1;
    string side = 2;           // 可选过滤
    string status = 3;         // 可选过滤
    int32 limit = 4;
}

message UpdateOrderStatusRequest {
    string order_id = 1;
    string status = 2;         // submitted, partially_filled, filled, cancelled, rejected
    string filled_quantity = 3;
    string filled_amount = 4;
}

// ========== 响应消息 ==========

message CreateOrderResponse {
    bool success = 1;
    string order_id = 2;
    string message = 3;
    Order order = 4;
}

message CancelOrderResponse {
    bool success = 1;
    string message = 2;
    Order order = 3;
}

message GetOrderResponse {
    Order order = 1;
}

message GetUserOrdersResponse {
    repeated Order orders = 1;
    int64 total = 2;
    int32 page = 3;
    int32 page_size = 4;
}

message GetOrdersByMarketResponse {
    repeated Order orders = 1;
    int32 count = 2;
}

message UpdateOrderStatusResponse {
    bool success = 1;
    string message = 2;
}

// ========== 数据模型 ==========

message Order {
    string id = 1;
    int64 user_id = 2;
    int64 market_id = 3;
    int64 outcome_id = 4;
    string side = 5;
    string order_type = 6;
    string price = 7;
    string quantity = 8;
    string filled_quantity = 9;
    string filled_amount = 10;
    string status = 11;
    string client_order_id = 12;
    int64 created_at = 13;
    int64 updated_at = 14;
}
syntax = "proto3";

package portfolio;

service PortfolioService {
    // Account
    rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse);
    rpc Credit(CreditRequest) returns (CreditResponse);
    rpc Debit(DebitRequest) returns (DebitResponse);
    rpc Freeze(FreezeRequest) returns (FreezeResponse);
    rpc Unfreeze(UnfreezeRequest) returns (UnfreezeResponse);

    // Position
    rpc GetPositions(GetPositionsRequest) returns (GetPositionsResponse);
    rpc GetPosition(GetPositionRequest) returns (GetPositionResponse);

    // Clearing
    rpc SettleTrade(SettleTradeRequest) returns (SettleTradeResponse);
    rpc SettleMarket(SettleMarketRequest) returns (SettleMarketResponse);

    // Ledger
    rpc GetLedger(GetLedgerRequest) returns (GetLedgerResponse);
}

// Account
message GetBalanceRequest {
    string user_id = 1;
    string asset = 2;
}
message GetBalanceResponse {
    string account_id = 1;
    string asset = 2;
    string available = 3;
    string frozen = 4;
}

message CreditRequest {
    string user_id = 1;
    string asset = 2;
    string amount = 3;
}
message CreditResponse {
    bool success = 1;
    string available_after = 2;
}

message DebitRequest {
    string user_id = 1;
    string asset = 2;
    string amount = 3;
}
message DebitResponse {
    bool success = 1;
    string available_after = 2;
}

message FreezeRequest {
    string user_id = 1;
    string asset = 2;
    string amount = 3;
    string order_id = 4;
}
message FreezeResponse {
    bool success = 1;
    string available_after = 2;
    string frozen_after = 3;
}

message UnfreezeRequest {
    string user_id = 1;
    string asset = 2;
    string amount = 3;
    string order_id = 4;
}
message UnfreezeResponse {
    bool success = 1;
}

// Position
message GetPositionsRequest {
    string user_id = 1;
    uint64 market_id = 2;
}
message GetPositionsResponse {
    repeated Position positions = 1;
}
message Position {
    string id = 1;
    uint64 market_id = 2;
    uint64 outcome_id = 3;
    string side = 4;
    string size = 5;
    string entry_price = 6;
}

message GetPositionRequest {
    string user_id = 1;
    uint64 market_id = 2;
    uint64 outcome_id = 3;
    string side = 4;
}
message GetPositionResponse {
    Position position = 1;
}

// Clearing
message SettleTradeRequest {
    string trade_id = 1;
    uint64 market_id = 2;
    string buyer_id = 3;
    string seller_id = 4;
    string price = 5;
    string size = 6;
    string taker_fee_rate = 7;
    string maker_fee_rate = 8;
    uint64 outcome_id = 9;
}
message SettleTradeResponse {
    bool success = 1;
    string settlement_id = 2;
}

// Market Settlement (payout distribution for resolved markets)
message SettleMarketRequest {
    uint64 market_id = 1;
    uint64 winning_outcome_id = 2;
    repeated UserPayout payouts = 3;
}

message UserPayout {
    string user_id = 1;
    string quantity = 2;
    string payout_amount = 3;
}

message SettleMarketResponse {
    bool success = 1;
    int32 users_credited = 2;
}

// Ledger
message GetLedgerRequest {
    string user_id = 1;
    string account_id = 2;
    int32 limit = 3;
    int32 offset = 4;
}
message GetLedgerResponse {
    repeated LedgerEntry entries = 1;
}
message LedgerEntry {
    string id = 1;
    string ledger_type = 2;
    string asset = 3;
    string amount = 4;
    string balance_after = 5;
    string reference_id = 6;
    string created_at = 7;
}

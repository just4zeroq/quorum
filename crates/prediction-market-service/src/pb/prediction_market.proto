syntax = "proto3";

package prediction_market;

service PredictionMarketService {
    // 市场管理
    rpc CreateMarket(CreateMarketRequest) returns (CreateMarketResponse);
    rpc UpdateMarket(UpdateMarketRequest) returns (UpdateMarketResponse);
    rpc CloseMarket(CloseMarketRequest) returns (CloseMarketResponse);
    rpc GetMarket(GetMarketRequest) returns (GetMarketResponse);
    rpc ListMarkets(ListMarketsRequest) returns (ListMarketsResponse);

    // 选项管理
    rpc AddOutcome(AddOutcomeRequest) returns (AddOutcomeResponse);
    rpc GetOutcomes(GetOutcomesRequest) returns (GetOutcomesResponse);

    // 行情
    rpc GetMarketPrice(GetMarketPriceRequest) returns (GetMarketPriceResponse);
    rpc GetMarketDepth(GetMarketDepthRequest) returns (GetMarketDepthResponse);

    // 结算
    rpc ResolveMarket(ResolveMarketRequest) returns (ResolveMarketResponse);
    rpc CalculatePayout(CalculatePayoutRequest) returns (CalculatePayoutResponse);

    // 用户持仓
    rpc GetUserPositions(GetUserPositionsRequest) returns (GetUserPositionsResponse);
}

// ========== 市场管理 ==========

message CreateMarketRequest {
    string question = 1;
    string description = 2;
    string category = 3;
    string image_url = 4;
    repeated CreateOutcomeRequest outcomes = 5;
    int64 start_time = 6;
    int64 end_time = 7;
}

message CreateOutcomeRequest {
    string name = 1;
    string description = 2;
    string image_url = 3;
}

message CreateMarketResponse {
    int64 market_id = 1;
    PredictionMarket market = 2;
    repeated MarketOutcome outcomes = 3;
}

message UpdateMarketRequest {
    int64 market_id = 1;
    string question = 2;
    string description = 3;
    string image_url = 4;
    int64 end_time = 5;
}

message UpdateMarketResponse {
    bool success = 1;
    PredictionMarket market = 2;
}

message CloseMarketRequest {
    int64 market_id = 1;
}

message CloseMarketResponse {
    bool success = 1;
}

message GetMarketRequest {
    int64 market_id = 1;
}

message GetMarketResponse {
    PredictionMarket market = 1;
    repeated MarketOutcome outcomes = 2;
}

message ListMarketsRequest {
    string category = 1;
    string status = 2;
    int32 page = 3;
    int32 page_size = 4;
}

message ListMarketsResponse {
    repeated PredictionMarket markets = 1;
    int64 total = 2;
    int32 page = 3;
    int32 page_size = 4;
}

// ========== 选项管理 ==========

message AddOutcomeRequest {
    int64 market_id = 1;
    string name = 2;
    string description = 3;
    string image_url = 4;
}

message AddOutcomeResponse {
    bool success = 1;
    MarketOutcome outcome = 2;
}

message GetOutcomesRequest {
    int64 market_id = 1;
}

message GetOutcomesResponse {
    repeated MarketOutcome outcomes = 1;
}

// ========== 行情 ==========

message GetMarketPriceRequest {
    int64 market_id = 1;
}

message GetMarketPriceResponse {
    int64 market_id = 1;
    repeated OutcomePrice prices = 2;
}

message OutcomePrice {
    int64 outcome_id = 1;
    string name = 2;
    string price = 3;
    string volume = 4;
    string probability = 5;
}

message GetMarketDepthRequest {
    int64 market_id = 1;
    int32 depth = 2;
}

message GetMarketDepthResponse {
    int64 market_id = 1;
    repeated OrderBookLevel bids = 2;
    repeated OrderBookLevel asks = 3;
}

message OrderBookLevel {
    string price = 1;
    string quantity = 2;
}

// ========== 结算 ==========

message ResolveMarketRequest {
    int64 market_id = 1;
    int64 outcome_id = 2;
}

message ResolveMarketResponse {
    bool success = 1;
    string message = 2;
    MarketResolution resolution = 3;
}

message CalculatePayoutRequest {
    int64 market_id = 1;
    int64 user_id = 2;
}

message CalculatePayoutResponse {
    int64 market_id = 1;
    int64 user_id = 2;
    string total_payout = 3;
    repeated UserPositionPayout positions = 4;
}

message UserPositionPayout {
    int64 outcome_id = 1;
    string outcome_name = 2;
    string quantity = 3;
    string avg_price = 4;
    string payout = 5;
}

// ========== 用户持仓 ==========

message GetUserPositionsRequest {
    int64 user_id = 1;
    int64 market_id = 2;
}

message GetUserPositionsResponse {
    repeated UserPosition positions = 1;
}

// ========== 数据模型 ==========

message PredictionMarket {
    int64 id = 1;
    string question = 2;
    string description = 3;
    string category = 4;
    string image_url = 5;
    int64 start_time = 6;
    int64 end_time = 7;
    string status = 8;
    int64 resolved_outcome_id = 9;
    int64 resolved_at = 10;
    string total_volume = 11;
    int64 created_at = 12;
    int64 updated_at = 13;
}

message MarketOutcome {
    int64 id = 1;
    int64 market_id = 2;
    string name = 3;
    string description = 4;
    string image_url = 5;
    string price = 6;
    string volume = 7;
    string probability = 8;
    int64 created_at = 9;
    int64 updated_at = 10;
}

message UserPosition {
    int64 id = 1;
    int64 user_id = 2;
    int64 market_id = 3;
    int64 outcome_id = 4;
    string quantity = 5;
    string avg_price = 6;
    int64 created_at = 7;
    int64 updated_at = 8;
}

message MarketResolution {
    int64 id = 1;
    int64 market_id = 2;
    int64 outcome_id = 3;
    string total_payout = 4;
    string winning_quantity = 5;
    string payout_ratio = 6;
    int64 resolved_at = 7;
}
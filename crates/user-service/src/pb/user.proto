syntax = "proto3";

package user;

service UserService {
    // 邮箱/用户名注册登录
    rpc Register(RegisterRequest) returns (RegisterResponse);
    rpc Login(LoginRequest) returns (LoginResponse);
    rpc Logout(LogoutRequest) returns (LogoutResponse);
    rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);

    // 钱包登录
    rpc WalletLogin(WalletLoginRequest) returns (WalletLoginResponse);
    rpc WalletBind(WalletBindRequest) returns (WalletBindResponse);
    rpc GetWalletNonce(GetWalletNonceRequest) returns (GetWalletNonceResponse);

    // 用户信息
    rpc GetUser(GetUserRequest) returns (GetUserResponse);
    rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
    rpc GetUserProfile(GetUserProfileRequest) returns (GetUserProfileResponse);

    // 安全设置
    rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse);
    rpc Enable2FA(Enable2FARequest) returns (Enable2FAResponse);
    rpc Disable2FA(Disable2FARequest) returns (Disable2FAResponse);
    rpc Verify2FA(Verify2FARequest) returns (Verify2FAResponse);

    // KYC
    rpc SubmitKYC(SubmitKYCRequest) returns (SubmitKYCResponse);
    rpc GetKYCStatus(GetKYCStatusRequest) returns (GetKYCStatusResponse);

    // 会话管理
    rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
    rpc KillSession(KillSessionRequest) returns (KillSessionResponse);
    rpc KillAllSessions(KillAllSessionsRequest) returns (KillAllSessionsResponse);
}

// ========== 请求/响应 ==========

message RegisterRequest {
    string username = 1;
    string email = 2;
    string password = 3;
    string invite_code = 4;
    string ip_address = 5;
    string user_agent = 6;
}

message RegisterResponse {
    string user_id = 1;
    string token = 2;
    User user = 3;
}

message LoginRequest {
    string email = 1;
    string password = 2;
    string code_2fa = 3;
    string ip_address = 4;
    string user_agent = 5;
    string device_id = 6;
}

message LoginResponse {
    string user_id = 1;
    string token = 2;
    string refresh_token = 3;
    int64 expires_at = 4;
    bool need_2fa = 5;
    User user = 6;
    AccountSummary accounts = 7;
}

message LogoutRequest {
    string user_id = 1;
    string token = 2;
}

message LogoutResponse {
    bool success = 1;
}

message RefreshTokenRequest {
    string refresh_token = 1;
}

message RefreshTokenResponse {
    string token = 1;
    string refresh_token = 2;
    int64 expires_at = 3;
}

// 钱包登录
message GetWalletNonceRequest {
    string wallet_address = 1;
    string wallet_type = 2;
}

message GetWalletNonceResponse {
    string nonce = 1;
    int64 expires_at = 2;
}

message WalletLoginRequest {
    string wallet_address = 1;
    string wallet_type = 2;
    string signature = 3;
    string ip_address = 4;
    string user_agent = 5;
    string device_id = 6;
}

message WalletLoginResponse {
    string user_id = 1;
    string token = 2;
    string refresh_token = 3;
    int64 expires_at = 4;
    bool is_new_user = 5;
    User user = 6;
    bool need_bind_email = 7;
}

message WalletBindRequest {
    string user_id = 1;
    string email = 2;
    string password = 3;
}

message WalletBindResponse {
    bool success = 1;
    string message = 2;
}

// 用户信息
message GetUserRequest {
    string user_id = 1;
}

message GetUserResponse {
    User user = 1;
}

message UpdateUserRequest {
    string user_id = 1;
    string username = 2;
    string email = 3;
}

message UpdateUserResponse {
    bool success = 1;
    User user = 2;
}

message GetUserProfileRequest {
    string user_id = 1;
}

message GetUserProfileResponse {
    User user = 1;
    UserSettings settings = 2;
    UserRisk risk = 3;
    repeated UserTag tags = 4;
}

// 安全设置
message ChangePasswordRequest {
    string user_id = 1;
    string old_password = 2;
    string new_password = 3;
}

message ChangePasswordResponse {
    bool success = 1;
    string message = 2;
}

message Enable2FARequest {
    string user_id = 1;
    string password = 2;
}

message Enable2FAResponse {
    bool success = 1;
    string secret = 2;
    string qr_code = 3;
}

message Disable2FARequest {
    string user_id = 1;
    string code_2fa = 2;
}

message Disable2FAResponse {
    bool success = 1;
    string message = 2;
}

message Verify2FARequest {
    string user_id = 1;
    string code_2fa = 2;
}

message Verify2FAResponse {
    bool valid = 1;
}

// KYC
message SubmitKYCRequest {
    string user_id = 1;
    string real_name = 2;
    string id_number = 3;
    string id_type = 4;  // id_card, passport, driver_license
    string front_image = 5;
    string back_image = 6;
    string selfie_image = 7;
}

message SubmitKYCResponse {
    bool success = 1;
    string message = 2;
}

message GetKYCStatusRequest {
    string user_id = 1;
}

message GetKYCStatusResponse {
    string status = 1;  // none, submitting, pending, verified, rejected
    string reason = 2;
    int32 level = 3;
}

// 会话管理
message ListSessionsRequest {
    string user_id = 1;
    int32 page = 2;
    int32 page_size = 3;
}

message ListSessionsResponse {
    repeated SessionInfo sessions = 1;
    int32 total = 2;
}

message KillSessionRequest {
    string user_id = 1;
    string session_id = 2;
}

message KillSessionResponse {
    bool success = 1;
}

message KillAllSessionsRequest {
    string user_id = 1;
    string except_session_id = 2;
}

message KillAllSessionsResponse {
    int32 killed_count = 1;
}

// ========== 数据模型 ==========

message User {
    string id = 1;
    string username = 2;
    string email = 3;
    string phone = 4;
    string status = 5;  // active, frozen, closed
    string kyc_status = 6;
    bool two_factor_enabled = 7;
    int64 created_at = 8;
    int64 updated_at = 9;
}

message UserSettings {
    string user_id = 1;
    string language = 2;
    string theme = 3;
    string timezone = 4;
    bool show_balance = 5;
    bool show_pnl = 6;
    bool compact_view = 7;
    Notifications notifications = 8;
    TradingPreferences trading_preferences = 9;
}

message Notifications {
    bool email = 1;
    bool sms = 2;
    bool push = 3;
    bool order_trade = 4;
    bool price_alert = 5;
    bool deposit_withdraw = 6;
    bool system = 7;
}

message TradingPreferences {
    bool confirm_order = 1;
    bool confirm_cancel = 2;
    string default_order_type = 3;
    string default_time_in_force = 4;
}

message UserRisk {
    string user_id = 1;
    int32 risk_level = 2;
    int32 kyc_level = 3;
    bool frozen = 4;
    string frozen_reason = 5;
}

message UserTag {
    string name = 1;
    string description = 2;
    string created_at = 3;
}

message WalletAddress {
    string address = 1;
    string wallet_type = 2;
    string chain_type = 3;
    string tag = 4;
    bool is_default = 5;
}

message SessionInfo {
    string session_id = 1;
    string device_id = 2;
    string device_type = 3;
    string ip_address = 4;
    string user_agent = 5;
    string location = 6;
    int64 created_at = 7;
    int64 last_active_at = 8;
    bool current = 9;
}

message AccountSummary {
    bool spot_enabled = 1;
    bool futures_enabled = 2;
    repeated WalletAddress deposit_addresses = 3;
}